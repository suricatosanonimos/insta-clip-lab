name: Deploy to KingHost

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Deploy to KingHost
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.KINGHOST_HOST }}
          username: ${{ secrets.KINGHOST_USER }}
          password: ${{ secrets.KINGHOST_PASS }}
          port: 22
          source: "dist/*"
          target: "/www/"
          strip_components: 1
