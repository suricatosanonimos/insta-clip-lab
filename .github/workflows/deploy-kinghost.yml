name: Deploy to KingHost

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Permite rodar manualmente

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build project
        run: bun run build

      - name: List build output
        run: |
          echo "📁 Conteúdo da pasta dist:"
          ls -la dist/ || echo "❌ Pasta dist não encontrada!"
          echo "📁 Conteúdo da pasta build:"
          ls -la build/ || echo "❌ Pasta build não encontrada!"

      - name: Check if dist exists
        id: check_dist
        run: |
          if [ -d "dist" ] && [ "$(ls -A dist)" ]; then
            echo "✅ Pasta dist existe e não está vazia"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Pasta dist vazia ou não existe"
            echo "exists=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Deploy to KingHost via FTP
        if: steps.check_dist.outputs.exists == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.KINGHOST_HOST }}
          username: ${{ secrets.KINGHOST_USER }}
          password: ${{ secrets.KINGHOST_PASS }}
          local-dir: ./dist/
          server-dir: /www/
          dangerous-clean-slate: true
